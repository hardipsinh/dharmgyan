<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>મહાભારત ૧૦૦ પ્રશ્નો - અલ્ટીમેટ ક્વિઝ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;600;700&display=swap');
        body { font-family: 'Hind Vadodara', sans-serif; background: #1a202c; color: white; touch-action: manipulation; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; transition: 0.3s; }
        .dot-pending { background: #4a5568; } /* Blackish-gray */
        .dot-correct { background: #48bb78; box-shadow: 0 0 5px #48bb78; }
        .dot-wrong { background: #f56565; box-shadow: 0 0 5px #f56565; }
        .dot-skip { background: #ffffff; box-shadow: 0 0 5px #ffffff; }
        .opt-card { transition: 0.3s; border: 2px solid transparent; cursor: pointer; }
        .opt-card:hover { transform: scale(1.02); background: rgba(255,255,255,0.15); }
        .active-listening { animation: pulse-red 1.5s infinite; border-color: #f56565 !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(245, 101, 101, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-2">

    <!-- Top Status Bar -->
    <div class="w-full max-w-4xl mt-4 p-4 glass rounded-2xl">
        <div class="flex justify-between items-center mb-2 text-xs font-bold uppercase tracking-wider text-gray-400">
            <span>Accuracy: <span id="accuracy-stat" class="text-orange-400">0%</span></span>
            <span>Timer: <span id="timer-stat" class="text-white">00:00</span></span>
            <span>Level: <span id="level-stat" class="text-yellow-400">1/10</span></span>
        </div>
        <!-- Progress Map -->
        <div id="progress-map" class="flex flex-wrap gap-1 justify-center mb-4">
            <!-- 100 dots injected by JS -->
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="w-full max-w-2xl mt-6 flex-grow">
        <!-- Quiz Screen -->
        <div id="quiz-screen" class="animate__animated animate__fadeIn">
            <div class="glass p-6 rounded-3xl relative overflow-hidden">
                <div id="voice-indicator" class="absolute top-4 right-4 text-xl hidden">🎙️</div>
                <div class="text-gray-400 text-sm mb-2 font-bold">પ્રશ્ન <span id="q-number">1</span>/100</div>
                <h2 id="q-text" class="text-2xl font-bold mb-8 leading-tight">પ્રશ્ન લોડ થઈ રહ્યો છે...</h2>
                
                <div id="options-grid" class="grid grid-cols-1 gap-4 mb-8">
                    <!-- Options injected here -->
                </div>

                <!-- Explanation / Feedback -->
                <div id="feedback" class="hidden animate__animated animate__fadeInUp">
                    <div id="exp-box" class="p-4 rounded-2xl bg-orange-900/30 border border-orange-500/50 text-orange-100 text-sm mb-6"></div>
                    <button onclick="nextStep()" class="w-full py-4 bg-orange-600 hover:bg-orange-700 rounded-2xl font-black text-xl shadow-lg transition-all">આગળ વધો ➔</button>
                </div>

                <div id="actions" class="flex justify-between items-center">
                    <button onclick="skipQuestion()" class="text-gray-400 hover:text-white underline font-bold">આ પ્રશ્ન છોડો (Skip)</button>
                    <button id="mic-btn" onclick="toggleVoice()" class="p-4 rounded-full bg-red-600 hover:bg-red-700 shadow-xl transition-all">
                        🎤 બોલીને જવાબ આપો
                    </button>
                </div>
            </div>
        </div>

        <!-- Level Review Screen -->
        <div id="review-screen" class="hidden animate__animated animate__fadeIn">
            <div class="glass p-8 rounded-3xl text-center">
                <h2 class="text-3xl font-black text-yellow-500 mb-2">પડાવ પૂર્ણ! 🏁</h2>
                <p class="text-gray-400 mb-6">તમે આ લેવલના ૧૦ પ્રશ્નો પૂર્ણ કર્યા છે.</p>
                <div class="grid grid-cols-2 gap-4 mb-8 text-left">
                    <div class="p-4 bg-green-900/20 rounded-xl border border-green-500/30">
                        <span class="block text-xs text-gray-500 uppercase">સાચા</span>
                        <span id="level-correct" class="text-2xl font-bold text-green-400">0</span>
                    </div>
                    <div class="p-4 bg-red-900/20 rounded-xl border border-red-500/30">
                        <span class="block text-xs text-gray-500 uppercase">ખોટા</span>
                        <span id="level-wrong" class="text-2xl font-bold text-red-400">0</span>
                    </div>
                </div>
                <button onclick="startNextLevel()" class="w-full py-4 bg-green-600 hover:bg-green-700 rounded-2xl font-black mb-4">આગળના ૧૦ પ્રશ્નો ➔</button>
                <button onclick="backToReview()" class="text-gray-400 hover:text-white underline">પ્રશ્નો ફરી જુઓ (Review)</button>
            </div>
        </div>

        <!-- Final Result Screen -->
        <div id="final-screen" class="hidden animate__animated animate__bounceIn">
            <div class="glass p-10 rounded-3xl text-center">
                <div class="text-6xl mb-6">🏆</div>
                <h2 class="text-4xl font-black mb-2">મહાભારત વિજેતા!</h2>
                <p id="final-accuracy" class="text-orange-400 font-bold mb-8">તમારી ચોકસાઈ: 0%</p>
                <button onclick="location.reload()" class="px-10 py-4 bg-white text-black font-black rounded-2xl">ફરીથી રમો</button>
            </div>
        </div>
    </main>

    <!-- Hidden Audio -->
    <audio id="snd-bell" src="https://actions.google.com/sounds/v1/alarms/temple_bell.ogg"></audio>
    <audio id="snd-wrong" src="https://actions.google.com/sounds/v1/cartoon/clown_horn.ogg"></audio>

    <script>
        const masterBank = [
            { q: "પાંડવો કેટલા ભાઈઓ હતા?", options: ["૩", "૫", "૭", "૧૦૦"], correct: 1, exp: "યુધિષ્ઠિર, ભીમ, અર્જુન, નકુલ અને સહદેવ પાંચ ભાઈઓ હતા." },
            { q: "કૌરવો કેટલા ભાઈઓ હતા?", options: ["૫", "૫૦", "૧૦૦", "૧૦૫"], correct: 2, exp: "ધૃતરાષ્ટ્ર અને ગાંધારીના ૧૦૦ પુત્રો હતા." },
            { q: "અર્જુનના પ્રિય સારથિ કોણ હતા?", options: ["ભીષ્મ", "કર્ણ", "શ્રીકૃષ્ણ", "શકુનિ"], correct: 2, exp: "શ્રીકૃષ્ણે અર્જુનનો રથ હાંક્યો હતો અને ગીતાનો ઉપદેશ આપ્યો હતો." },
            { q: "મહાભારતનું યુદ્ધ કેટલા દિવસ ચાલ્યું?", options: ["૧૦", "૧૫", "૧૮", "૨૧"], correct: 2, exp: "કુરુક્ષેત્રનું યુદ્ધ ૧૮ દિવસ સુધી ચાલ્યું હતું." },
            { q: "અભિમન્યુના પિતા કોણ હતા?", options: ["ભીમ", "અર્જુન", "નકુલ", "સહદેવ"], correct: 1, exp: "અભિમન્યુ અર્જુન અને સુભદ્રાનો પુત્ર હતો." },
            { q: "શકુનિ કોનો મામો હતો?", options: ["પાંડવો", "કૌરવો", "શ્રીકૃષ્ણ", "વિદુર"], correct: 1, exp: "શકુનિ ગાંધારીનો ભાઈ અને દુર્યોધનનો મામો હતો." },
            { q: "અર્જુનના ધનુષનું નામ શું હતું?", options: ["વિજય", "ગાંડીવ", "શારંગ", "પિનાક"], correct: 1, exp: "અગ્નિદેવે અર્જુનને ગાંડીવ ધનુષ આપ્યું હતું." },
            { q: "ભીષ્મ પિતામહનું મૂળ નામ શું હતું?", options: ["દેવવ્રત", "શાંતનુ", "વિચિત્રવીર્ય", "ચિત્રાંગદ"], correct: 0, exp: "ગંગાપુત્ર દેવવ્રતે ભીષ્મ પ્રતિજ્ઞા લીધા બાદ તેઓ ભીષ્મ કહેવાયા." },
            { q: "ચક્રવ્યૂહ ભેદવાની કળા કોણ જાણતું હતું?", options: ["કર્ણ", "ભીમ", "અભિમન્યુ", "નકુલ"], correct: 2, exp: "અભિમન્યુ ગર્ભમાં હતો ત્યારે જ આ કળા શીખ્યો હતો." },
            { q: "પાંડવોની પત્નીનું નામ શું હતું?", options: ["સીતા", "દ્રૌપદી", "ગાંધારી", "કુંતી"], correct: 1, exp: "દ્રૌપદી પાંચ પાંડવોની પત્ની હતી." },
            { q: "શ્રીકૃષ્ણના શંખનું નામ શું હતું?", options: ["અનંતવિજય", "પાંચજન્ય", "દેવદત્ત", "પૌણ્ડ્ર"], correct: 1, exp: "ભગવાન શ્રીકૃષ્ણના શંખનું નામ પાંચજન્ય હતું." },
            { q: "કર્ણના પાલક પિતા કોણ હતા?", options: ["અધિરથ", "દ્રુપદ", "શલ્ય", "સુબલ"], correct: 0, exp: "સારથિ અધિરથ અને રાધાએ કર્ણનો ઉછેર કર્યો હતો." },
            { q: "ધૃતરાષ્ટ્રના કયા પુત્રએ પાંડવોનો પક્ષ લીધો હતો?", options: ["વિકર્ણ", "યુયુત્સુ", "દુશાસન", "ચિત્રસેન"], correct: 1, exp: "યુયુત્સુ ધર્મનો સાથ આપવા પાંડવો તરફથી લડ્યો હતો." },
            { q: "દ્રૌપદીના પિતાનું નામ શું હતું?", options: ["દ્રુપદ", "વિરાટ", "શલ્ય", "પાંડુ"], correct: 0, exp: "રાજા દ્રુપદ પાંચાલ દેશના રાજા હતા." },
            { q: "ભીષ્મ કેટલા દિવસ સેનાપતિ રહ્યા હતા?", options: ["૫", "૧૦", "૧૨", "૧૫"], correct: 1, exp: "પ્રથમ ૧૦ દિવસ ભીષ્મ પિતામહ સેનાપતિ હતા." },
            { q: "ગુરુ દ્રોણના પુત્રનું નામ શું હતું?", options: ["કૃપાચાર્ય", "અશ્વત્થામા", "કર્ણ", "યુયુત્સુ"], correct: 1, exp: "અશ્વત્થામા દ્રોણાચાર્યના પુત્ર હતા." },
            { q: "લક્ષાગૃહ કોણે બનાવ્યું હતું?", options: ["દુર્યોધન", "શકુનિ", "પુરોચન", "કર્ણ"], correct: 2, exp: "દુર્યોધનના કહેવા પર પુરોચને મીણનો મહેલ બનાવ્યો હતો." },
            { q: "અર્જુન અજ્ઞાતવાસમાં કયા નામે ઓળખાયા?", options: ["કંક", "વલ્લભ", "બૃહન્નલા", "તન્તિપાલ"], correct: 2, exp: "અર્જુન નૃત્ય ગુરુ બૃહન્નલા તરીકે રહ્યા હતા." },
            { q: "યુધિષ્ઠિર અજ્ઞાતવાસમાં કયા નામે ઓળખાયા?", options: ["કંક", "વલ્લભ", "ગ્રંથિક", "બૃહન્નલા"], correct: 0, exp: "યુધિષ્ઠિર રાજા વિરાટના દરબારમાં કંક નામે રહ્યા હતા." },
            { q: "ભીમ અજ્ઞાતવાસમાં કયા નામે ઓળખાયા?", options: ["વલ્લભ", "કંક", "બૃહન્નલા", "તન્તિપાલ"], correct: 0, exp: "ભીમ રસોઈયા વલ્લભ તરીકે રહ્યા હતા." },
            { q: "કર્ણના કવચ અને કુંડળ કોણે માંગ્યા હતા?", options: ["કૃષ્ણ", "ઈન્દ્ર", "શિવ", "બ્રહ્મા"], correct: 1, exp: "અર્જુનની રક્ષા માટે ઈન્દ્ર દેવે બ્રાહ્મણ વેશે કવચ-કુંડળ માંગ્યા હતા." },
            { q: "શ્રીકૃષ્ણની બહેન કોણ હતી?", options: ["દ્રૌપદી", "ઉત્તરા", "સુભદ્રા", "દુશલા"], correct: 2, exp: "સુભદ્રા શ્રીકૃષ્ણના બહેન અને અર્જુનની પત્ની હતી." },
            { q: "એકલવ્યના પિતાનું નામ શું હતું?", options: ["હિરણ્યધનુ", "દ્રુપદ", "વિરાટ", "શાંતનુ"], correct: 0, exp: "એકલવ્ય નિષાદ રાજ હિરણ્યધનુનો પુત્ર હતો." },
            { q: "મહાભારત કોણે લખ્યું હતું?", options: ["વેદ વ્યાસ", "ગણેશજી", "વાલ્મીકિ", "તુલસીદાસ"], correct: 1, exp: "વેદ વ્યાસે બોલ્યા હતા અને ગણેશજીએ લખ્યું હતું." },
            { q: "કૌરવોની એકમાત્ર બહેનનું નામ શું હતું?", options: ["દુશલા", "સુભદ્રા", "રેવતી", "ઉત્તરા"], correct: 0, exp: "દુશલા જેના લગ્ન જયદ્રથ સાથે થયા હતા." },
            { q: "ઘટોત્કચ કોનો પુત્ર હતો?", options: ["અર્જુન", "ભીમ", "કર્ણ", "દુર્યોધન"], correct: 1, exp: "ભીમ અને હિડિમ્બાનો પુત્ર." },
            { q: "ગાંધારી કયા દેશની રાજકુમારી હતી?", options: ["મદ્ર", "પાંચાલ", "ગાંધાર", "મત્સ્ય"], correct: 2, exp: "ગાંધાર દેશ (વર્તમાન અફઘાનિસ્તાન)." },
            { q: "પાંડુ રાજાની બીજી પત્ની કોણ હતી?", options: ["કુંતી", "માદ્રી", "સત્યવતી", "ગંગા"], correct: 1, exp: "માદ્રી જે નકુલ અને સહદેવની માતા હતી." },
            { q: "સહદેવ કઈ વિદ્યામાં નિપુણ હતા?", options: ["ગદા", "ધનુષ", "જ્યોતિષ અને તલવાર", "મલ્લયુદ્ધ"], correct: 2, exp: "સહદેવ ત્રિકાળ જ્ઞાની અને જ્યોતિષમાં શ્રેષ્ઠ હતા." },

            { q: "યુદ્ધના પ્રારંભમાં અર્જુન જ્યારે મોહિત થયો ત્યારે કૃષ્ણે કયું રૂપ બતાવ્યું?", options: ["વિશ્વરૂપ", "વામનરૂપ", "નરસિંહ", "રામરૂપ"], correct: 0, exp: "ભગવાને પોતાનું વિરાટ વિશ્વરૂપ પ્રગટ કર્યું હતું." }
        ];

        let state = {
            index: 0,
            score: 0,
            results: new Array(100).fill('pending'), // 'correct', 'wrong', 'skip'
            levelCorrect: 0,
            levelWrong: 0,
            answered: false,
            timer: 0,
            interval: null,
            listening: false
        };

        // UI Helpers
        const $ = (id) => document.getElementById(id);

        function init() {
            // Create 100 dots
            const map = $('progress-map');
            for(let i=0; i<100; i++) {
                const d = document.createElement('div');
                d.id = `dot-${i}`;
                d.className = 'dot dot-pending';
                map.appendChild(d);
            }
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            state.interval = setInterval(() => {
                state.timer++;
                const min = String(Math.floor(state.timer / 60)).padStart(2, '0');
                const sec = String(state.timer % 60).padStart(2, '0');
                $('timer-stat').innerText = `${min}:${sec}`;
            }, 1000);
        }

        function renderQuestion() {
            state.answered = false;
            const q = masterBank[state.index];
            $('q-number').innerText = state.index + 1;
            $('q-text').innerText = q.q;
            $('level-stat').innerText = `${Math.floor(state.index/10)+1}/10`;
            
            const grid = $('options-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'opt-card p-5 glass rounded-2xl flex items-center gap-4';
                btn.innerHTML = `
                    <span class="w-8 h-8 rounded-full bg-orange-500/20 flex items-center justify-center font-bold text-orange-400 border border-orange-500/30">${i+1}</span>
                    <span class="text-lg font-semibold">${opt}</span>
                `;
                btn.onclick = () => selectOption(i);
                grid.appendChild(btn);
            });

            $('feedback').classList.add('hidden');
            $('actions').classList.remove('hidden');
            
            // Text to speech auto-read
            autoRead(q);
        }

        function autoRead(q) {
            const speech = new SpeechSynthesisUtterance();
            speech.lang = 'gu-IN';
            speech.text = `પ્રશ્ન: ${q.q}. ઓપ્શન્સ છે: ૧. ${q.options[0]}. ૨. ${q.options[1]}. ૩. ${q.options[2]}. ૪. ${q.options[3]}.`;
            window.speechSynthesis.speak(speech);
        }

        function selectOption(i) {
            if(state.answered) return;
            state.answered = true;
            window.speechSynthesis.cancel();

            const q = masterBank[state.index];
            const isCorrect = (i === q.correct);
            const grid = $('options-grid').children;

            if(isCorrect) {
                grid[i].style.background = '#2d4a3b';
                grid[i].style.borderColor = '#48bb78';
                state.score++;
                state.levelCorrect++;
                state.results[state.index] = 'correct';
                $('snd-bell').play();
            } else {
                grid[i].style.background = '#4a2d2d';
                grid[i].style.borderColor = '#f56565';
                grid[q.correct].style.borderColor = '#48bb78';
                state.levelWrong++;
                state.results[state.index] = 'wrong';
                $('snd-wrong').play();
            }

            updateStats();
            showFeedback(q.exp);
        }

        function showFeedback(exp) {
            $('exp-box').innerText = `સમજૂતી: ${exp}`;
            $('feedback').classList.remove('hidden');
            $('actions').classList.add('hidden');
        }

        function skipQuestion() {
            state.results[state.index] = 'skip';
            updateStats();
            nextStep();
        }

        function updateStats() {
            // Update dot colors
            const status = state.results[state.index];
            const dot = $(`dot-${state.index}`);
            dot.className = `dot dot-${status}`;

            // Update accuracy
            const attempted = state.results.filter(r => r !== 'pending').length;
            const correctCount = state.results.filter(r => r === 'correct').length;
            const acc = attempted > 0 ? Math.round((correctCount / attempted) * 100) : 0;
            $('accuracy-stat').innerText = `${acc}%`;
        }

        function nextStep() {
            state.index++;
            if(state.index % 10 === 0 && state.index < 100) {
                showReview();
            } else if(state.index >= 100) {
                finishGame();
            } else {
                renderQuestion();
            }
        }

        function showReview() {
            $('quiz-screen').classList.add('hidden');
            $('review-screen').classList.remove('hidden');
            $('level-correct').innerText = state.levelCorrect;
            $('level-wrong').innerText = state.levelWrong;
        }

        function startNextLevel() {
            state.levelCorrect = 0;
            state.levelWrong = 0;
            $('review-screen').classList.add('hidden');
            $('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function backToReview() {
            // Logic to go back 10 steps and reset dots to pending to allow re-attempt
            // Simply showing previous level result index
            state.index -= 10;
            for(let i=state.index; i<state.index+10; i++) {
                state.results[i] = 'pending';
                $(`dot-${i}`).className = 'dot dot-pending';
            }
            startNextLevel();
        }

        function finishGame() {
            clearInterval(state.interval);
            $('quiz-screen').classList.add('hidden');
            $('review-screen').classList.add('hidden');
            $('final-screen').classList.remove('hidden');
            const totalCorrect = state.results.filter(r => r === 'correct').length;
            $('final-accuracy').innerText = `તમારી ચોકસાઈ: ${Math.round((totalCorrect/100)*100)}%`;
        }

        // Voice Access Implementation
        function toggleVoice() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("તમારા બ્રાઉઝરમાં વોઈસ કંટ્રોલ સપોર્ટેડ નથી.");
                return;
            }

            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'gu-IN';
            
            recognition.onstart = () => {
                state.listening = true;
                $('mic-btn').classList.add('active-listening');
                $('voice-indicator').classList.remove('hidden');
            };

            recognition.onresult = (event) => {
                const command = event.results[0][0].transcript;
                processVoice(command);
            };

            recognition.onend = () => {
                state.listening = false;
                $('mic-btn').classList.remove('active-listening');
                $('voice-indicator').classList.add('hidden');
            };

            recognition.start();
        }

        function processVoice(text) {
            text = text.toLowerCase();
            if(text.includes('પહેલો') || text.includes('એક') || text.includes('one')) selectOption(0);
            else if(text.includes('બીજો') || text.includes('બે') || text.includes('two')) selectOption(1);
            else if(text.includes('ત્રીજો') || text.includes('ત્રણ') || text.includes('three')) selectOption(2);
            else if(text.includes('ચોથો') || text.includes('ચાર') || text.includes('four')) selectOption(3);
            else if(text.includes('સ્કીપ') || text.includes('skip')) skipQuestion();
            else if(text.includes('નેક્સ્ટ') || text.includes('next')) nextStep();
        }

        window.onload = init;
    </script>
</body>
</html>
