<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>મહાભારત રણસંગ્રામ - અલ્ટીમેટ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;700&display=swap');
        body { font-family: 'Hind Vadodara', sans-serif; background: #0f0505; color: #fce7bc; overflow-x: hidden; }
        .glass { background: rgba(30, 10, 10, 0.98); border: 2px solid #b45309; box-shadow: 0 0 30px rgba(180, 83, 9, 0.4); }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #333; margin: 0 3px; }
        .dot-correct { background: #10b981 !important; }
        .dot-wrong { background: #ef4444 !important; }
        .option-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid #78350f; transition: 0.2s; cursor: pointer; width: 100%; text-align: left; }
        .option-btn:hover { background: #451a03; border-color: #f59e0b; }
        .bow-track { height: 4px; background: rgba(180, 83, 9, 0.1); position: relative; width: 100%; border-radius: 2px; }
        #bow-arrow { position: absolute; top: -16px; font-size: 20px; transition: left 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: rotate(45deg); }
        #share-canvas-area { position: absolute; left: -9999px; top: -9999px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #b45309; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Screen for Capturing (Hidden) -->
    <div id="share-canvas-area" class="w-[400px] p-8 bg-[#1a0a0a] text-[#fce7bc] border-4 border-[#b45309] text-center">
        <h1 class="text-3xl font-black text-amber-500 mb-2">MAHABHARAT WAR</h1>
        <p id="capture-name" class="text-xl mb-4 opacity-70"></p>
        <div id="capture-gift" class="text-6xl mb-4">🏹</div>
        <div class="grid grid-cols-2 gap-4 mt-6">
            <div class="bg-black/40 p-4 border border-amber-900 rounded-xl">
                <p class="text-xs uppercase">Level</p>
                <p id="capture-lvl" class="text-2xl font-bold">1</p>
            </div>
            <div class="bg-black/40 p-4 border border-amber-900 rounded-xl">
                <p class="text-xs uppercase">Score</p>
                <p id="capture-score" class="text-2xl font-bold">0</p>
            </div>
        </div>
        <p class="mt-8 text-xs italic">શું તમે મને હરાવી શકશો?</p>
    </div>

    <!-- Start Name Popup -->
    <div id="popup" class="fixed inset-0 flex items-center justify-center p-6 z-[200] hidden">
        <div class="glass p-8 rounded-3xl max-w-md w-full text-center">
            <h2 class="text-3xl font-black mb-6 text-amber-500 uppercase italic">યોદ્ધાનું સ્વાગત!</h2>
            <input type="text" id="username-input" class="w-full p-4 bg-black border border-amber-600 rounded-xl mb-6 text-center text-xl text-white outline-none" placeholder="તમારું નામ...">
            <button onclick="startGame()" class="w-full py-4 bg-amber-600 rounded-xl font-bold text-black text-xl hover:bg-amber-500 shadow-2xl">યુદ્ધ શરૂ કરો</button>
        </div>
    </div>

    <!-- Header -->
    <header class="w-full max-w-4xl flex justify-between items-center mb-8 py-4 border-b border-amber-900/40">
        <div>
            <h1 class="text-2xl font-black text-amber-500 italic uppercase">MAHABHARAT</h1>
            <p id="player-display" class="text-[10px] text-amber-200/50 mt-1 uppercase font-bold tracking-widest"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleAudio()" id="audio-btn" class="bg-amber-900/30 p-2 rounded-xl border border-amber-800 text-lg">🔊</button>
            <button onclick="showInventory()" class="bg-amber-900/30 px-3 py-1 rounded-xl border border-amber-800 text-[10px] font-black uppercase tracking-tighter">🎒 શસ્ત્રો</button>
            <button onclick="showGlobalStats()" class="bg-amber-900/30 px-3 py-1 rounded-xl border border-amber-800 text-[10px] font-black uppercase">📊 Stats</button>
            <button onclick="toggleLang()" id="lang-btn" class="bg-amber-700 px-3 py-1 rounded text-[10px] font-bold">GU/EN</button>
        </div>
    </header>

    <main class="w-full max-w-2xl">
        <!-- Progress with Arrow -->
        <div class="mb-10 px-4">
            <div class="flex justify-between text-[10px] font-bold text-amber-600 uppercase mb-4">
                <div class="flex items-center gap-2">
                    <button onclick="prevLevel()" class="hover:text-white">⏮️</button>
                    <span>લેવલ <span id="level-num">1</span></span>
                    <button onclick="jumpNextLevel()" id="next-lvl-jump" class="hidden hover:text-white">⏭️</button>
                </div>
                <span id="total-count-text">Quest: 1/--</span>
            </div>
            <div class="bow-track">
                <div id="bow-arrow">🏹</div>
            </div>
            <div id="status-dots" class="flex justify-center mt-6"></div>
        </div>

        <!-- Main Card -->
        <div id="game-card" class="glass p-8 md:p-12 rounded-[2.5rem] relative min-h-[450px]">
            <!-- Quiz UI -->
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-8 text-[10px] font-black text-amber-500/50 uppercase">
                    <span id="q-counter">Quest: 1/10</span>
                    <span id="score-display">Score: 000</span>
                </div>
                <h2 id="q-text" class="text-2xl md:text-3xl font-bold mb-10 leading-relaxed min-h-[120px]">લોડ થઈ રહ્યું છે...</h2>
                <div id="options-grid" class="grid grid-cols-1 gap-4 mb-8"></div>
                <button onclick="skipQuestion()" class="w-full py-2 text-[10px] font-bold text-amber-200/30 uppercase hover:text-amber-200 transition">Skip Question</button>
                <div id="feedback" class="hidden mt-8 animate-pulse">
                    <div class="p-6 bg-black/40 border-l-4 border-amber-600 rounded-2xl mb-6 text-sm italic" id="exp-text"></div>
                    <button onclick="handleNext()" class="w-full py-4 bg-amber-600 rounded-2xl font-black text-xl text-black">આગળ વધો ➔</button>
                </div>
            </div>

            <!-- Result UI -->
            <div id="result-ui" class="hidden text-center py-6">
                <div id="gift-icon" class="text-7xl mb-6">🔱</div>
                <h2 class="text-3xl font-black text-amber-500 mb-2 uppercase">લેવલ પૂર્ણ!</h2>
                <p id="gift-text" class="text-amber-200/60 mb-8 italic"></p>
                <div class="grid grid-cols-3 gap-3 mb-10">
                    <div class="bg-black/40 p-4 border border-green-900/40 rounded-xl">
                        <p class="text-[9px] uppercase">Sacha</p>
                        <p id="sacha-count" class="text-xl font-bold text-green-500">0</p>
                    </div>
                    <div class="bg-black/40 p-4 border border-red-900/40 rounded-xl">
                        <p class="text-[9px] uppercase">Khota</p>
                        <p id="khota-count" class="text-xl font-bold text-red-500">0</p>
                    </div>
                    <div class="bg-black/40 p-4 border border-white/10 rounded-xl">
                        <p class="text-[9px] uppercase">Skip</p>
                        <p id="skip-count" class="text-xl font-bold">0</p>
                    </div>
                </div>
                <div class="space-y-3">
                    <button onclick="copyScoreImage()" class="w-full py-4 bg-green-700 rounded-xl font-bold text-white flex items-center justify-center gap-2">
                        📋 Score Image Copy (Clipboard)
                    </button>
                    <button onclick="nextLevel()" class="w-full py-5 bg-amber-600 rounded-2xl font-black text-xl text-black">Next Level ⏭️</button>
                </div>
            </div>

            <!-- Stats/Inventory UI -->
            <div id="utility-ui" class="hidden">
                <div class="flex justify-between items-center mb-6 border-b border-amber-900 pb-4">
                    <h2 id="utility-title" class="text-xl font-black text-amber-500 uppercase italic">Stats</h2>
                    <button onclick="render()" class="text-[10px] font-bold border border-amber-600 px-3 py-1 rounded-full">Close</button>
                </div>
                <div id="utility-content" class="max-h-[350px] overflow-y-auto custom-scroll pr-2"></div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-10 text-center">
        <div class="inline-flex items-center gap-3 px-6 py-2 bg-black/40 rounded-full border border-amber-900/30">
            <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[10px] font-bold text-amber-200/40 uppercase tracking-widest">
                Warriors Joined: <span id="visitor-count">1,502</span>
            </span>
        </div>
    </footer>

    <script>
        let state = {
            user: localStorage.getItem('mb_user') || '',
            lang: localStorage.getItem('mb_lang') || 'gu',
            level: parseInt(localStorage.getItem('mb_lvl')) || 1,
            maxLevel: parseInt(localStorage.getItem('mb_max_lvl')) || 1,
            qIdx: 0,
            score: parseInt(localStorage.getItem('mb_score')) || 0,
            db: [],
            results: [],
            isMuted: false,
            answered: false,
            weapons: JSON.parse(localStorage.getItem('mb_weapons')) || [],
            allStats: JSON.parse(localStorage.getItem('mb_all_stats')) || { totalSacha: 0, totalKhota: 0, levelsPassed: 0 }
        };

        const weaponsPool = [
            { n: "ગાંડીવ ધનુષ", i: "🏹", d: "અર્જુનનું દિવ્ય ધનુષ" },
            { n: "સુદર્શન ચક્ર", i: "💿", d: "શ્રીકૃષ્ણનું અમોઘ શસ્ત્ર" },
            { n: "કૌમોદકી ગદા", i: "🔨", d: "ભીમની ગદા" },
            { n: "વિજય ધનુષ", i: "🏹", d: "કર્ણનું ધનુષ" },
            { n: "પશુપતાસ્ત્ર", i: "🔱", d: "મહાદેવનું અસ્ત્ર" }
        ];

        async function init() {
            if(!state.user) {
                document.getElementById('popup').classList.remove('hidden');
            } else {
                document.getElementById('player-display').innerText = `Warrior: ${state.user}`;
                await loadDB();
                render();
            }
        }

        async function loadDB() {
            try {
                const res = await fetch(`que_${state.lang}.json`);
                state.db = await res.json();
            } catch(e) {
                state.db = Array.from({length: 400}, (_, i) => ({
                    q: `પ્રશ્ન ${i+1}: મહાભારત વિશેની આ વિગત શું છે?`,
                    options: ["ઓપ્શન ૧", "ઓપ્શન ૨", "ઓપ્શન ૩", "ઓપ્શન ૪"],
                    correct: 0,
                    exp: "આ પ્રશ્નની વિસ્તૃત સમજૂતી અહીં આવશે."
                }));
            }
        }

        function startGame() {
            const name = document.getElementById('username-input').value.trim();
            if(!name) return;
            state.user = name;
            localStorage.setItem('mb_user', name);
            document.getElementById('popup').classList.add('hidden');
            document.getElementById('player-display').innerText = `Warrior: ${name}`;
            loadDB().then(render);
        }

        function toggleLang() {
            state.lang = state.lang === 'gu' ? 'en' : 'gu';
            localStorage.setItem('mb_lang', state.lang);
            loadDB().then(() => { state.qIdx = 0; render(); });
        }

        function render() {
            state.answered = false;
            const absIdx = ((state.level - 1) * 10) + state.qIdx;
            const q = state.db[absIdx];

            document.getElementById('level-num').innerText = state.level;
            document.getElementById('total-count-text').innerText = `Quest: ${absIdx + 1}/${state.db.length}`;
            document.getElementById('q-counter').innerText = `Quest: ${state.qIdx + 1}/10`;
            document.getElementById('score-display').innerText = `Score: ${state.score.toString().padStart(3, '0')}`;
            document.getElementById('q-text').innerText = q.q;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn p-4 rounded-xl font-bold flex items-center gap-3 text-sm';
                btn.innerHTML = `<span class="opacity-20 text-xs">${i+1}.</span> ${opt}`;
                btn.onclick = () => checkAnswer(i, btn);
                grid.appendChild(btn);
            });

            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('result-ui').classList.add('hidden');
            document.getElementById('utility-ui').classList.add('hidden');
            document.getElementById('feedback').classList.add('hidden');
            grid.classList.remove('pointer-events-none');
            
            updateVisuals();
            speakSequence(q.q, q.options);
            checkLevelJump();
        }

        function updateVisuals() {
            const perc = (state.qIdx / 10) * 100;
            document.getElementById('bow-arrow').style.left = `calc(${perc}% - 12px)`;
            const dots = document.getElementById('status-dots');
            dots.innerHTML = '';
            for(let i=0; i<10; i++) {
                const d = document.createElement('span');
                d.className = 'dot';
                if(state.results[i]) {
                    if(state.results[i].status === 'correct') d.classList.add('dot-correct');
                    else if(state.results[i].status === 'wrong') d.classList.add('dot-wrong');
                }
                dots.appendChild(d);
            }
        }

        function checkAnswer(idx, btn) {
            if(state.answered) return;
            state.answered = true;
            window.speechSynthesis.cancel();
            const absIdx = ((state.level - 1) * 10) + state.qIdx;
            const q = state.db[absIdx];
            const isCorrect = idx === q.correct;

            document.getElementById('options-grid').classList.add('pointer-events-none');
            if(isCorrect) {
                btn.classList.add('bg-green-900', 'border-green-500');
                state.score += 100;
                state.allStats.totalSacha++;
                state.results[state.qIdx] = { status: 'correct' };
            } else {
                btn.classList.add('bg-red-900', 'border-red-500');
                document.getElementById('options-grid').children[q.correct].classList.add('bg-green-900', 'border-green-500');
                state.allStats.totalKhota++;
                state.results[state.qIdx] = { status: 'wrong' };
            }

            document.getElementById('exp-text').innerText = q.exp;
            document.getElementById('feedback').classList.remove('hidden');
            updateVisuals();
            saveState();
        }

        function skipQuestion() {
            if(state.answered) return;
            state.results[state.qIdx] = { status: 'skip' };
            handleNext();
        }

        function handleNext() {
            state.qIdx++;
            if(state.qIdx >= 10) showLevelResult();
            else render();
        }

        function showLevelResult() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            
            const weapon = weaponsPool[Math.floor(Math.random() * weaponsPool.length)];
            state.weapons.push({ ...weapon, lvl: state.level });
            if(state.level >= state.maxLevel) {
                state.maxLevel = state.level + 1;
                state.allStats.levelsPassed++;
            }

            document.getElementById('gift-icon').innerText = weapon.i;
            document.getElementById('gift-text').innerText = `અભિનંદન યોદ્ધા ${state.user}! તમે લેવલ ${state.level} પાસ કર્યું અને તમને '${weapon.n}' મળ્યું.`;
            document.getElementById('sacha-count').innerText = state.results.filter(r => r.status === 'correct').length;
            document.getElementById('khota-count').innerText = state.results.filter(r => r.status === 'wrong').length;
            document.getElementById('skip-count').innerText = state.results.filter(r => r.status === 'skip').length;
            saveState();
        }

        function nextLevel() {
            state.level++;
            state.qIdx = 0;
            state.results = [];
            render();
        }

        function prevLevel() {
            if(state.level <= 1) return;
            state.level--;
            state.qIdx = 0;
            state.results = [];
            render();
        }

        function jumpNextLevel() {
            if(state.level < state.maxLevel) {
                state.level++;
                state.qIdx = 0;
                state.results = [];
                render();
            }
        }

        function checkLevelJump() {
            const btn = document.getElementById('next-lvl-jump');
            if(state.level < state.maxLevel) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        }

        function showInventory() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.add('hidden');
            const util = document.getElementById('utility-ui');
            util.classList.remove('hidden');
            document.getElementById('utility-title').innerText = "My Weapons (શસ્ત્રો)";
            
            const cont = document.getElementById('utility-content');
            cont.innerHTML = '';
            state.weapons.forEach(w => {
                const d = document.createElement('div');
                d.className = 'bg-black/40 p-4 border border-amber-900 rounded-xl mb-3 flex items-center gap-4';
                d.innerHTML = `<div class="text-3xl">${w.i}</div><div><p class="font-bold text-amber-500">${w.n}</p><p class="text-[9px] opacity-40 uppercase">LEVEL ${w.lvl}</p></div>`;
                cont.appendChild(d);
            });
        }

        function showGlobalStats() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.add('hidden');
            const util = document.getElementById('utility-ui');
            util.classList.remove('hidden');
            document.getElementById('utility-title').innerText = "Battle Stats (કુલ પ્રગતિ)";
            
            const cont = document.getElementById('utility-content');
            cont.innerHTML = `
                <div class="space-y-4">
                    <div class="p-6 bg-amber-900/20 rounded-2xl border border-amber-800 text-center">
                        <p class="text-xs uppercase opacity-60">Total Levels Passed</p>
                        <p class="text-4xl font-black">${state.allStats.levelsPassed}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-green-900/20 rounded-xl border border-green-900/40 text-center">
                            <p class="text-[10px] uppercase opacity-60">Total Sacha</p>
                            <p class="text-2xl font-bold text-green-500">${state.allStats.totalSacha}</p>
                        </div>
                        <div class="p-4 bg-red-900/20 rounded-xl border border-red-900/40 text-center">
                            <p class="text-[10px] uppercase opacity-60">Total Khota</p>
                            <p class="text-2xl font-bold text-red-500">${state.allStats.totalKhota}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function speakSequence(qText, options) {
            if(state.isMuted) return;
            window.speechSynthesis.cancel();
            const langCode = state.lang === 'gu' ? 'gu-IN' : 'en-US';
            
            const qUtter = new SpeechSynthesisUtterance(qText);
            qUtter.lang = langCode;
            qUtter.rate = 0.95;

            qUtter.onend = () => {
                options.forEach((opt, idx) => {
                    setTimeout(() => {
                        if(state.answered || state.isMuted) return;
                        const optUtter = new SpeechSynthesisUtterance(`ઓપ્શન ${idx+1}: ${opt}`);
                        optUtter.lang = langCode;
                        optUtter.rate = 1.0;
                        window.speechSynthesis.speak(optUtter);
                    }, idx * 1500);
                });
            };
            window.speechSynthesis.speak(qUtter);
        }

        async function copyScoreImage() {
            const area = document.getElementById('share-canvas-area');
            document.getElementById('capture-name').innerText = `Warrior: ${state.user}`;
            document.getElementById('capture-score').innerText = state.score;
            document.getElementById('capture-lvl').innerText = state.level;
            const weapon = state.weapons[state.weapons.length - 1];
            if(weapon) document.getElementById('capture-gift').innerText = weapon.i;

            const canvas = await html2canvas(area);
            canvas.toBlob(async (blob) => {
                try {
                    const data = [new ClipboardItem({ [blob.type]: blob })];
                    await navigator.clipboard.write(data);
                    alert("તમારો સ્કોર કાર્ડ ઈમેજ તરીકે કોપી થઈ ગયો છે! હવે તમે વૉટ્સએપ પર પેસ્ટ કરી શકો છો.");
                } catch (err) {
                    alert("Clipboard error. Please try again.");
                }
            });
        }

        function toggleAudio() {
            state.isMuted = !state.isMuted;
            document.getElementById('audio-btn').innerText = state.isMuted ? '🔇' : '🔊';
            if(state.isMuted) window.speechSynthesis.cancel();
        }

        function saveState() {
            localStorage.setItem('mb_lvl', state.level);
            localStorage.setItem('mb_max_lvl', state.maxLevel);
            localStorage.setItem('mb_score', state.score);
            localStorage.setItem('mb_weapons', JSON.stringify(state.weapons));
            localStorage.setItem('mb_all_stats', JSON.stringify(state.allStats));
        }

        window.onload = init;
    </script>
</body>
</html>
