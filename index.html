<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>મહાભારત ૧૦૦ પ્રશ્નો - સંપૂર્ણ ક્વિઝ</title>
    <style>
        :root { --primary: #e67e22; --secondary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --bg: #fdf2e9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-card { background: white; width: 100%; max-width: 850px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header { text-align: center; margin-bottom: 20px; }
        .progress-container { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .progress-bar { flex-grow: 1; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
        .question-text { font-size: 1.3rem; font-weight: bold; color: var(--secondary); margin-bottom: 20px; min-height: 60px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
        .opt-btn { padding: 15px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-size: 1rem; text-align: left; transition: 0.2s; }
        .opt-btn:hover:not([disabled]) { border-color: var(--primary); background: #fff5eb; }
        .correct { background: var(--success) !important; color: white; border-color: var(--success) !important; }
        .wrong { background: var(--danger) !important; color: white; border-color: var(--danger) !important; }
        .explanation { margin-top: 20px; padding: 15px; border-radius: 8px; background: #e8f4fd; border-left: 5px solid #3498db; display: none; line-height: 1.6; }
        .controls { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .analysis-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        .analysis-table th, .analysis-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .analysis-table th { background: var(--secondary); color: white; }
        #result-area { display: none; }
        .scroll-box { max-height: 500px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="quiz-area">
        <div class="header">
            <h2 style="color:var(--primary); margin:0;">મહાભારત ૧૦૦ પ્રશ્નો મહા-ક્વિઝ</h2>
            <p id="live-score-top" style="font-weight:bold; color:var(--secondary);">સ્કોર: 0/100</p>
        </div>
        <div class="progress-container">
            <span id="q-count">1/100</span>
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        </div>
        <div id="question" class="question-text"></div>
        <div id="options" class="options-grid"></div>
        <div id="explanation" class="explanation"></div>
        <div class="controls">
            <button id="next-btn" class="btn" onclick="nextQuestion()" disabled>આગળ વધો</button>
        </div>
    </div>

    <div id="result-area">
        <h2 style="text-align:center; color: var(--secondary);">ક્વિઝ પૂર્ણ! તમારો રિપોર્ટ</h2>
        <div id="final-score" style="text-align:center; font-size: 2.5rem; color: var(--primary); margin-bottom: 20px;"></div>
        <div class="scroll-box">
            <table class="analysis-table">
                <thead><tr><th>પ્રશ્ન</th><th>તમારો જવાબ</th><th>સ્થિતિ</th></tr></thead>
                <tbody id="analysis-body"></tbody>
            </table>
        </div>
        <button class="btn" style="width:100%; margin-top:20px;" onclick="location.reload()">ફરીથી રમો</button>
    </div>
</div>

<script>
    const masterBank = [
        { q: "પાંડવો કેટલા ભાઈઓ હતા?", options: ["૩", "૫", "૭", "૧૦૦"], correct: 1, exp: "યુધિષ્ઠિર, ભીમ, અર્જુન, નકુલ અને સહદેવ પાંચ ભાઈઓ હતા." },
        { q: "કૌરવો કેટલા ભાઈઓ હતા?", options: ["૫", "૫૦", "૧૦૦", "૧૦૫"], correct: 2, exp: "ધૃતરાષ્ટ્ર અને ગાંધારીના ૧૦૦ પુત્રો હતા." },
        { q: "અર્જુનના પ્રિય સારથિ કોણ હતા?", options: ["ભીષ્મ", "કર્ણ", "શ્રીકૃષ્ણ", "શકુનિ"], correct: 2, exp: "શ્રીકૃષ્ણે અર્જુનનો રથ હાંક્યો હતો અને ગીતાનો ઉપદેશ આપ્યો હતો." },
        { q: "મહાભારતનું યુદ્ધ કેટલા દિવસ ચાલ્યું?", options: ["૧૦", "૧૫", "૧૮", "૨૧"], correct: 2, exp: "કુરુક્ષેત્રનું યુદ્ધ ૧૮ દિવસ સુધી ચાલ્યું હતું." },
        { q: "અભિમન્યુના પિતા કોણ હતા?", options: ["ભીમ", "અર્જુન", "નકુલ", "સહદેવ"], correct: 1, exp: "અભિમન્યુ અર્જુન અને સુભદ્રાનો પુત્ર હતો." },
        { q: "શકુનિ કોનો મામો હતો?", options: ["પાંડવો", "કૌરવો", "શ્રીકૃષ્ણ", "વિદુર"], correct: 1, exp: "શકુનિ ગાંધારીનો ભાઈ અને દુર્યોધનનો મામો હતો." },
        { q: "અર્જુનના ધનુષનું નામ શું હતું?", options: ["વિજય", "ગાંડીવ", "શારંગ", "પિનાક"], correct: 1, exp: "અગ્નિદેવે અર્જુનને ગાંડીવ ધનુષ આપ્યું હતું." },
        { q: "ભીષ્મ પિતામહનું મૂળ નામ શું હતું?", options: ["દેવવ્રત", "શાંતનુ", "વિચિત્રવીર્ય", "ચિત્રાંગદ"], correct: 0, exp: "ગંગાપુત્ર દેવવ્રતે ભીષ્મ પ્રતિજ્ઞા લીધા બાદ તેઓ ભીષ્મ કહેવાયા." },
        { q: "ચક્રવ્યૂહ ભેદવાની કળા કોણ જાણતું હતું?", options: ["કર્ણ", "ભીમ", "અભિમન્યુ", "નકુલ"], correct: 2, exp: "અભિમન્યુ ગર્ભમાં હતો ત્યારે જ આ કળા શીખ્યો હતો." },
        { q: "પાંડવોની પત્નીનું નામ શું હતું?", options: ["સીતા", "દ્રૌપદી", "ગાંધારી", "કુંતી"], correct: 1, exp: "દ્રૌપદી પાંચ પાંડવોની પત્ની હતી." },
        { q: "શ્રીકૃષ્ણના શંખનું નામ શું હતું?", options: ["અનંતવિજય", "પાંચજન્ય", "દેવદત્ત", "પૌણ્ડ્ર"], correct: 1, exp: "ભગવાન શ્રીકૃષ્ણના શંખનું નામ પાંચજન્ય હતું." },
        { q: "કર્ણના પાલક પિતા કોણ હતા?", options: ["અધિરથ", "દ્રુપદ", "શલ્ય", "સુબલ"], correct: 0, exp: "સારથિ અધિરથ અને રાધાએ કર્ણનો ઉછેર કર્યો હતો." },
        { q: "ધૃતરાષ્ટ્રના કયા પુત્રએ પાંડવોનો પક્ષ લીધો હતો?", options: ["વિકર્ણ", "યુયુત્સુ", "દુશાસન", "ચિત્રસેન"], correct: 1, exp: "યુયુત્સુ ધર્મનો સાથ આપવા પાંડવો તરફથી લડ્યો હતો." },
        { q: "દ્રૌપદીના પિતાનું નામ શું હતું?", options: ["દ્રુપદ", "વિરાટ", "શલ્ય", "પાંડુ"], correct: 0, exp: "રાજા દ્રુપદ પાંચાલ દેશના રાજા હતા." },
        { q: "ભીષ્મ કેટલા દિવસ સેનાપતિ રહ્યા હતા?", options: ["૫", "૧૦", "૧૨", "૧૫"], correct: 1, exp: "પ્રથમ ૧૦ દિવસ ભીષ્મ પિતામહ સેનાપતિ હતા." },
        { q: "ગુરુ દ્રોણના પુત્રનું નામ શું હતું?", options: ["કૃપાચાર્ય", "અશ્વત્થામા", "કર્ણ", "યુયુત્સુ"], correct: 1, exp: "અશ્વત્થામા દ્રોણાચાર્યના પુત્ર હતા." },
        { q: "લક્ષાગૃહ કોણે બનાવ્યું હતું?", options: ["દુર્યોધન", "શકુનિ", "પુરોચન", "કર્ણ"], correct: 2, exp: "દુર્યોધનના કહેવા પર પુરોચને મીણનો મહેલ બનાવ્યો હતો." },
        { q: "અર્જુન અજ્ઞાતવાસમાં કયા નામે ઓળખાયા?", options: ["કંક", "વલ્લભ", "બૃહન્નલા", "તન્તિપાલ"], correct: 2, exp: "અર્જુન નૃત્ય ગુરુ બૃહન્નલા તરીકે રહ્યા હતા." },
        { q: "યુધિષ્ઠિર અજ્ઞાતવાસમાં કયા નામે ઓળખાયા?", options: ["કંક", "વલ્લભ", "ગ્રંથિક", "બૃહન્નલા"], correct: 0, exp: "યુધિષ્ઠિર રાજા વિરાટના દરબારમાં કંક નામે રહ્યા હતા." },
        { q: "ભીમ અજ્ઞાતવાસમાં કયા નામે ઓળખાયા?", options: ["વલ્લભ", "કંક", "બૃહન્નલા", "તન્તિપાલ"], correct: 0, exp: "ભીમ રસોઈયા વલ્લભ તરીકે રહ્યા હતા." },
        { q: "કર્ણના કવચ અને કુંડળ કોણે માંગ્યા હતા?", options: ["કૃષ્ણ", "ઈન્દ્ર", "શિવ", "બ્રહ્મા"], correct: 1, exp: "અર્જુનની રક્ષા માટે ઈન્દ્ર દેવે બ્રાહ્મણ વેશે કવચ-કુંડળ માંગ્યા હતા." },
        { q: "શ્રીકૃષ્ણની બહેન કોણ હતી?", options: ["દ્રૌપદી", "ઉત્તરા", "સુભદ્રા", "દુશલા"], correct: 2, exp: "સુભદ્રા શ્રીકૃષ્ણના બહેન અને અર્જુનની પત્ની હતી." },
        { q: "એકલવ્યના પિતાનું નામ શું હતું?", options: ["હિરણ્યધનુ", "દ્રુપદ", "વિરાટ", "શાંતનુ"], correct: 0, exp: "એકલવ્ય નિષાદ રાજ હિરણ્યધનુનો પુત્ર હતો." },
        { q: "મહાભારત કોણે લખ્યું હતું?", options: ["વેદ વ્યાસ", "ગણેશજી", "વાલ્મીકિ", "તુલસીદાસ"], correct: 1, exp: "વેદ વ્યાસે બોલ્યા હતા અને ગણેશજીએ લખ્યું હતું." },
        { q: "કૌરવોની એકમાત્ર બહેનનું નામ શું હતું?", options: ["દુશલા", "સુભદ્રા", "રેવતી", "ઉત્તરા"], correct: 0, exp: "દુશલા જેના લગ્ન જયદ્રથ સાથે થયા હતા." },
        { q: "ઘટોત્કચ કોનો પુત્ર હતો?", options: ["અર્જુન", "ભીમ", "કર્ણ", "દુર્યોધન"], correct: 1, exp: "ભીમ અને હિડિમ્બાનો પુત્ર." },
        { q: "ગાંધારી કયા દેશની રાજકુમારી હતી?", options: ["મદ્ર", "પાંચાલ", "ગાંધાર", "મત્સ્ય"], correct: 2, exp: "ગાંધાર દેશ (વર્તમાન અફઘાનિસ્તાન)." },
        { q: "પાંડુ રાજાની બીજી પત્ની કોણ હતી?", options: ["કુંતી", "માદ્રી", "સત્યવતી", "ગંગા"], correct: 1, exp: "માદ્રી જે નકુલ અને સહદેવની માતા હતી." },
        { q: "સહદેવ કઈ વિદ્યામાં નિપુણ હતા?", options: ["ગદા", "ધનુષ", "જ્યોતિષ અને તલવાર", "મલ્લયુદ્ધ"], correct: 2, exp: "સહદેવ ત્રિકાળ જ્ઞાની અને જ્યોતિષમાં શ્રેષ્ઠ હતા." },
        { q: "નકુલ કઈ વિદ્યામાં નિપુણ હતા?", options: ["અશ્વ વિદ્યા", "ગદા", "જ્યોતિષ", "ધનુષ"], correct: 0, exp: "નકુલ ઘોડાઓની સંભાળ અને ચિકિત્સામાં નિપુણ હતા." },
        { q: "કર્ણનો જન્મ કયા દેવના આશીર્વાદથી થયો હતો?", options: ["ઈન્દ્ર", "સૂર્ય", "અગ્નિ", "વાયુ"], correct: 1, exp: "કુંતીએ સૂર્યદેવનું આહવાન કરીને કર્ણને પ્રાપ્ત કર્યા હતા." },
        { q: "યુધિષ્ઠિર કયા દેવના પુત્ર હતા?", options: ["ધર્મરાજ (યમ)", "વાયુ", "ઈન્દ્ર", "અશ્વિની કુમાર"], correct: 0, exp: "યુધિષ્ઠિર ધર્મરાજ (યમ)ના પુત્ર હતા." },
        { q: "ભીમ કયા દેવના પુત્ર હતા?", options: ["વાયુ", "ઈન્દ્ર", "સૂર્ય", "વરુણ"], correct: 0, exp: "ભીમ પવનદેવ (વાયુ)ના પુત્ર હતા." },

    ];

    let currentIdx = 0;
    let score = 0;
    let userResponses = [];

    function loadQuestion() {
        const q = masterBank[currentIdx];
        document.getElementById('question').innerText = (currentIdx + 1) + ". " + q.q;
        document.getElementById('q-count').innerText = `${currentIdx + 1} / ${masterBank.length}`;
        document.getElementById('progress').style.width = ((currentIdx + 1) / masterBank.length * 100) + "%";
        
        const optGrid = document.getElementById('options');
        optGrid.innerHTML = '';
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('next-btn').disabled = true;

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = 'opt-btn';
            btn.onclick = () => handleSelect(i, btn);
            optGrid.appendChild(btn);
        });
    }

    function handleSelect(idx, btn) {
        const q = masterBank[currentIdx];
        const allBtns = document.querySelectorAll('.opt-btn');
        const correct = idx === q.correct;

        userResponses.push({ q: q.q, selected: q.options[idx], status: correct });

        if(correct) {
            btn.classList.add('correct');
            score++;
            document.getElementById('live-score-top').innerText = `સ્કોર: ${score}/${masterBank.length}`;
        } else {
            btn.classList.add('wrong');
            allBtns[q.correct].classList.add('correct');
        }

        allBtns.forEach(b => b.disabled = true);
        const exp = document.getElementById('explanation');
        exp.innerHTML = `<strong>સમજૂતી:</strong> ${q.exp}`;
        exp.style.display = 'block';
        document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < masterBank.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${masterBank.length}`;
        
        const tbody = document.getElementById('analysis-body');
        userResponses.forEach(res => {
            tbody.innerHTML += `<tr>
                <td>${res.q}</td>
                <td>${res.selected}</td>
                <td style="color:${res.status?'green':'red'}; font-weight:bold">${res.status?'સાચું':'ખોટું'}</td>
            </tr>`;
        });
    }

    loadQuestion();
</script>
