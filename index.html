<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>મહાભારત રણસંગ્રામ - દિવ્ય અસ્ત્ર એડિશન</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;700&display=swap');
        body { font-family: 'Hind Vadodara', sans-serif; background: #0a0505; color: #fce7bc; overflow-x: hidden; }
        .glass { background: rgba(25, 10, 10, 0.98); border: 2px solid #b45309; box-shadow: 0 0 40px rgba(180, 83, 9, 0.3); }
        .option-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid #78350f; transition: all 0.2s ease; cursor: pointer; width: 100%; text-align: left; }
        .option-btn:hover { background: #451a03; transform: translateX(5px); border-color: #f59e0b; }
        .bow-track { height: 6px; background: rgba(180, 83, 9, 0.1); position: relative; width: 100%; border-radius: 10px; }
        #bow-arrow { position: absolute; top: -18px; font-size: 24px; transition: left 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: rotate(45deg); filter: drop-shadow(0 0 5px #f59e0b); }
        .reward-card { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #b45309; border-radius: 10px; }
        #capture-zone { position: fixed; left: -9999px; top: 0; width: 500px; padding: 40px; background: #1a0a0a; border: 10px solid #b45309; color: #fce7bc; text-align: center; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Share Capture Area (Hidden) -->
    <div id="capture-zone">
        <h1 style="font-size: 40px; color: #f59e0b; font-weight: 900; margin-bottom: 10px;">MAHABHARAT WAR</h1>
        <p id="cap-user" style="font-size: 24px; opacity: 0.8;"></p>
        <div id="cap-reward-icon" style="font-size: 100px; margin: 30px 0;">🏹</div>
        <h2 id="cap-reward-name" style="font-size: 32px; color: #fce7bc;">ગાંડીવ ધનુષ</h2>
        <div style="display: flex; justify-content: space-around; margin-top: 40px;">
            <div><p style="font-size: 14px; opacity: 0.6;">LEVEL</p><p id="cap-lvl" style="font-size: 30px; font-weight: 900;">1</p></div>
            <div><p style="font-size: 14px; opacity: 0.6;">SCORE</p><p id="cap-score" style="font-size: 30px; font-weight: 900;">1200</p></div>
        </div>
        <p style="margin-top: 50px; font-style: italic; opacity: 0.5;">ડાઉનલોડ કરો અને તમારા મિત્રોને ચેલેન્જ આપો!</p>
    </div>

    <!-- Initial Name Popup -->
    <div id="popup" class="fixed inset-0 flex items-center justify-center p-6 z-[200] hidden">
        <div class="glass p-10 rounded-[3rem] max-w-md w-full text-center border-4">
            <div class="text-6xl mb-6 animate-bounce">🚩</div>
            <h2 class="text-3xl font-black mb-6 text-amber-500 uppercase italic">ધર્મયુદ્ધમાં સ્વાગત છે!</h2>
            <input type="text" id="username-input" class="w-full p-5 bg-black border-2 border-amber-600 rounded-2xl mb-6 text-center text-xl text-white outline-none focus:border-amber-400 transition" placeholder="યોદ્ધાનું નામ લખો...">
            <button onclick="startGame()" class="w-full py-5 bg-gradient-to-r from-amber-700 to-amber-500 rounded-2xl font-black text-black text-2xl hover:scale-105 transition shadow-[0_0_20px_rgba(180,83,9,0.5)]">યુદ્ધ પ્રારંભ</button>
        </div>
    </div>

    <!-- Header -->
    <header class="w-full max-w-4xl flex justify-between items-center mb-8 py-4 border-b border-amber-900/40">
        <div>
            <h1 class="text-2xl font-black text-amber-500 italic uppercase flex items-center gap-2">
                <span>⚔️</span> MAHABHARAT
            </h1>
            <p id="player-display" class="text-[10px] text-amber-200/50 mt-1 uppercase font-bold tracking-widest"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleAudio()" id="audio-btn" class="bg-amber-900/30 p-2 rounded-xl border border-amber-800">🔊</button>
            <button onclick="showInventory()" class="bg-amber-900/30 px-3 py-1 rounded-xl border border-amber-800 text-[10px] font-black uppercase">🎒 ભાથો</button>
            <button onclick="showStats()" class="bg-amber-900/30 px-3 py-1 rounded-xl border border-amber-800 text-[10px] font-black uppercase">📊 આંકડા</button>
           <!-- <button onclick="toggleLang()" class="bg-amber-700 px-3 py-1 rounded text-[10px] font-bold">GU/EN</button> -->
        </div>
    </header>

    <main class="w-full max-w-2xl">
        <!-- Progress Section -->
        <div class="mb-10 px-4">
            <div class="flex justify-between text-[11px] font-bold text-amber-600 uppercase mb-5">
                <div class="flex items-center gap-3">
                    <button onclick="changeLevel(-1)" class="hover:text-white transition">⏮️</button>
                    <span class="bg-amber-900/40 px-3 py-1 rounded-full">લેવલ <span id="level-num">1</span></span>
                    <button id="next-lock-btn" onclick="changeLevel(1)" class="opacity-30 cursor-not-allowed">⏭️</button>
                </div>
                <span id="q-total-count" class="opacity-50 tracking-widest">QUEST: 1/400</span>
            </div>
            <div class="bow-track">
                <div id="bow-arrow">🏹</div>
            </div>
            <div id="dots-container" class="flex justify-center mt-6 gap-1"></div>
        </div>

        <!-- Dynamic Content Card -->
        <div id="main-card" class="glass p-8 md:p-12 rounded-[3rem] relative min-h-[500px] flex flex-col">
            
            <!-- Quiz UI -->
            <div id="quiz-ui" class="flex-1">
                <div class="flex justify-between items-center mb-8 text-[10px] font-black text-amber-500/40 uppercase">
                    <span>Quest: <span id="q-curr">1</span>/10</span>
                    <span>Score: <span id="score-val">0</span></span>
                </div>
                <h2 id="q-text" class="text-2xl md:text-3xl font-bold mb-10 leading-tight min-h-[140px]"></h2>
                <div id="options-box" class="grid grid-cols-1 gap-4 mb-8"></div>
                
                <div id="feedback-box" class="hidden animate-in fade-in duration-500">
                    <div class="p-5 bg-amber-900/20 border-l-4 border-amber-500 rounded-xl mb-6 text-sm italic leading-relaxed" id="explanation"></div>
                    <button onclick="nextQuestion()" class="w-full py-5 bg-amber-600 rounded-2xl font-black text-xl text-black shadow-xl hover:bg-amber-500 transition">આગળ વધો ➔</button>
                </div>
            </div>

            <!-- Level Summary UI -->
            <div id="summary-ui" class="hidden text-center py-4">
                <div id="reward-icon" class="text-8xl mb-4 drop-shadow-[0_0_15px_rgba(245,158,11,0.8)]">🔱</div>
                <h2 class="text-3xl font-black text-amber-500 mb-2 uppercase">વિજય ભવ!</h2>
                <p id="reward-msg" class="text-amber-100/70 mb-8 italic"></p>
                
                <div class="overflow-x-auto mb-8 rounded-2xl border border-amber-900/50">
                    <table class="w-full text-[11px] text-left">
                        <thead class="bg-amber-900/40 text-amber-500 uppercase">
                            <tr>
                                <th class="p-3">પ્રશ્ન</th>
                                <th class="p-3">પરિણામ</th>
                            </tr>
                        </thead>
                        <tbody id="summary-table-body" class="bg-black/20"></tbody>
                    </table>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-8">
                    <button onclick="shareLevelResult()" class="py-4 bg-green-700 rounded-xl font-bold text-white flex items-center justify-center gap-2 hover:bg-green-600 transition">
                        📲 ડાયરેક્ટ શેર કરો
                    </button>
                    <button onclick="nextLevelStart()" class="py-4 bg-amber-600 rounded-xl font-bold text-black hover:bg-amber-500 transition">
                        બીજું લેવલ ⏭️
                    </button>
                </div>
            </div>

            <!-- Stats & Inventory (Combined View) -->
            <div id="overlay-ui" class="hidden">
                <div class="flex justify-between items-center mb-8 border-b border-amber-900 pb-4">
                    <h2 id="overlay-title" class="text-2xl font-black text-amber-500 uppercase italic">Stats</h2>
                    <button onclick="closeOverlay()" class="text-2xl">✕</button>
                </div>
                <div id="overlay-content" class="max-h-[400px] overflow-y-auto custom-scroll pr-3"></div>
            </div>

        </div>
    </main>

    <footer class="mt-auto py-8 text-center opacity-40">
        <p class="text-[10px] uppercase tracking-[0.3em]">Total Warriors: <div id="hitCount"></div></p>
    </footer>

    <script>
        // --- Game State ---
        let state = {
            user: localStorage.getItem('mb_user') || '',
            lang: localStorage.getItem('mb_lang') || 'gu',
            lvl: parseInt(localStorage.getItem('mb_lvl')) || 1,
            maxLvl: parseInt(localStorage.getItem('mb_max_lvl')) || 1,
            qIdx: 0,
            score: parseInt(localStorage.getItem('mb_score')) || 0,
            db: [],
            lvlResults: [], // Results for CURRENT level
            history: JSON.parse(localStorage.getItem('mb_history')) || {}, // All levels data
            rewards: JSON.parse(localStorage.getItem('mb_rewards')) || [],
            isMuted: false,
            busy: false
        };

        const rewardsPool = [
            { n: "ગાંડીવ ધનુષ", i: "🏹", t: "weapon" },
            { n: "સુદર્શન ચક્ર", i: "💿", t: "weapon" },
            { n: "કૌમોદકી ગદા", i: "🔨", t: "weapon" },
            { n: "પશુપતાસ્ત્ર", i: "🔱", t: "weapon" },
            { n: "ઉચ્ચૈઃશ્રવા અશ્વ", i: "🐎", t: "horse" },
            { n: "નંદિઘોષ રથ", i: "🏎️", t: "chariot" },
            { n: "વિજય ધનુષ", i: "🏹", t: "weapon" },
            { n: "બ્રહ્માસ્ત્ર", i: "🔥", t: "weapon" }
        ];

        async function init() {
            if(!state.user) {
                document.getElementById('popup').classList.remove('hidden');
            } else {
                document.getElementById('player-display').innerText = `Warrior: ${state.user}`;
                await loadQuestions();
                renderQuiz();
            }
        }

        async function loadQuestions() {
            try {
                const res = await fetch(`que_${state.lang}.json`);
                state.db = await res.json();
            } catch(e) {
                // Mock fallback
                state.db = Array.from({length: 400}, (_, i) => ({
                    q: `(${state.lang}) મહાભારત પ્રશ્ન ${i+1}?`,
                    options: ["ઓપ્શન A", "ઓપ્શન B", "ઓપ્શન C", "ઓપ્શન D"],
                    correct: 0,
                    exp: "આ પ્રશ્નની સમજૂતી અહીં આવશે."
                }));
            }
        }

        function startGame() {
            const n = document.getElementById('username-input').value.trim();
            if(!n) return;
            state.user = n;
            localStorage.setItem('mb_user', n);
            document.getElementById('popup').classList.add('hidden');
            document.getElementById('player-display').innerText = `Warrior: ${n}`;
            loadQuestions().then(renderQuiz);
        }

        function renderQuiz() {
            state.busy = false;
            const absIdx = ((state.lvl - 1) * 10) + state.qIdx;
            const q = state.db[absIdx];

            // UI Updates
            document.getElementById('level-num').innerText = state.lvl;
            document.getElementById('q-total-count').innerText = `QUEST: ${absIdx + 1}/${state.db.length}`;
            document.getElementById('q-curr').innerText = state.qIdx + 1;
            document.getElementById('score-val').innerText = state.score;
            document.getElementById('q-text').innerText = q.q;

            const box = document.getElementById('options-box');
            box.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn p-4 rounded-2xl font-bold flex items-center gap-4';
                btn.innerHTML = `<span class="bg-amber-900/50 w-8 h-8 rounded-lg flex items-center justify-center text-xs text-amber-500">${i+1}</span> ${opt}`;
                btn.onclick = () => handleAnswer(i, btn);
                box.appendChild(btn);
            });

            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('summary-ui').classList.add('hidden');
            document.getElementById('overlay-ui').classList.add('hidden');
            document.getElementById('feedback-box').classList.add('hidden');
            box.classList.remove('pointer-events-none');

            updateProgress();
            speakQAndA(q);
            updateNavButtons();
        }

        function handleAnswer(idx, btn) {
            if(state.busy) return;
            state.busy = true;
            window.speechSynthesis.cancel();

            const absIdx = ((state.lvl - 1) * 10) + state.qIdx;
            const q = state.db[absIdx];
            const isRight = idx === q.correct;

            document.getElementById('options-box').classList.add('pointer-events-none');
            
            if(isRight) {
                btn.classList.add('bg-green-900/60', 'border-green-500', 'shadow-[0_0_15px_rgba(34,197,94,0.3)]');
                state.score += 100;
                state.lvlResults[state.qIdx] = { q: q.q, status: '✅ Correct' };
            } else {
                btn.classList.add('bg-red-900/60', 'border-red-500');
                document.getElementById('options-box').children[q.correct].classList.add('bg-green-900/60', 'border-green-400');
                state.lvlResults[state.qIdx] = { q: q.q, status: '❌ Wrong' };
            }

            document.getElementById('explanation').innerText = q.exp;
            document.getElementById('feedback-box').classList.remove('hidden');
            saveProgress();
        }

        function nextQuestion() {
            state.qIdx++;
            if(state.qIdx >= 10) finishLevel();
            else renderQuiz();
        }

        function finishLevel() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('summary-ui').classList.remove('hidden');

            // Save Level to History
            state.history[state.lvl] = [...state.lvlResults];
            
            // Reward logic
            const reward = rewardsPool[Math.floor(Math.random() * rewardsPool.length)];
            state.rewards.push({...reward, lvl: state.lvl});
            
            if(state.lvl >= state.maxLvl) state.maxLvl = state.lvl + 1;

            document.getElementById('reward-icon').innerText = reward.i;
            document.getElementById('reward-msg').innerText = `અદભુત! તમે લેવલ ${state.lvl} જીત્યું છે. ભેટમાં તમને '${reward.n}' પ્રાપ્ત થયું છે.`;

            // Table Summary
            const tbody = document.getElementById('summary-table-body');
            tbody.innerHTML = '';
            state.lvlResults.forEach(r => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-amber-900/20";
                tr.innerHTML = `<td class="p-3 opacity-70">${r.q.substring(0, 40)}...</td><td class="p-3 font-bold ${r.status.includes('✅') ? 'text-green-500':'text-red-500'}">${r.status}</td>`;
                tbody.appendChild(tr);
            });

            saveProgress();
        }

        function nextLevelStart() {
            state.lvl++;
            state.qIdx = 0;
            state.lvlResults = [];
            renderQuiz();
        }

        function changeLevel(dir) {
            const target = state.lvl + dir;
            if(target < 1 || target > state.maxLvl) return;
            state.lvl = target;
            state.qIdx = 0;
            state.lvlResults = [];
            renderQuiz();
        }

        function updateProgress() {
            const perc = (state.qIdx / 10) * 100;
            document.getElementById('bow-arrow').style.left = `calc(${perc}% - 12px)`;
            
            const dots = document.getElementById('dots-container');
            dots.innerHTML = '';
            for(let i=0; i<10; i++){
                const dot = document.createElement('div');
                dot.className = `h-1.5 w-6 rounded-full ${state.lvlResults[i] ? (state.lvlResults[i].status.includes('✅') ? 'bg-green-500':'bg-red-500') : 'bg-white/10'}`;
                dots.appendChild(dot);
            }
        }

        async function shareLevelResult() {
            const area = document.getElementById('capture-zone');
            document.getElementById('cap-user').innerText = `Warrior: ${state.user}`;
            document.getElementById('cap-lvl').innerText = state.lvl;
            document.getElementById('cap-score').innerText = state.score;
            
            const lastReward = state.rewards[state.rewards.length - 1];
            document.getElementById('cap-reward-icon').innerText = lastReward.i;
            document.getElementById('cap-reward-name').innerText = lastReward.n;

            const canvas = await html2canvas(area);
            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'mahabharat-score.png', { type: 'image/png' });
                if (navigator.share) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'મહાભારત રણસંગ્રામ રિઝલ્ટ',
                            text: `મેં લેવલ ${state.lvl} પૂરું કર્યું અને મને ${lastReward.n} મળ્યું! તમે રમી શકશો?`
                        });
                    } catch (err) { console.error("Share failed", err); }
                } else {
                    alert("તમારું બ્રાઉઝર ડાયરેક્ટ શેર સપોર્ટ નથી કરતું. ઈમેજ કોપી કરો.");
                }
            });
        }

        function showInventory() {
            openOverlay("મારા દિવ્ય અસ્ત્રો અને ભેટ");
            const cont = document.getElementById('overlay-content');
            cont.innerHTML = state.rewards.length ? '' : '<p class="text-center py-20 opacity-30 italic">હજુ કોઈ ભેટ મળી નથી...</p>';
            
            state.rewards.forEach(r => {
                const div = document.createElement('div');
                div.className = "bg-amber-900/20 p-5 rounded-2xl mb-4 border border-amber-800/50 flex items-center gap-5 reward-card";
                div.innerHTML = `<div class="text-5xl">${r.i}</div><div><h3 class="font-black text-amber-500 text-xl">${r.n}</h3><p class="text-[10px] uppercase opacity-40 italic">લેવલ ${r.lvl} પર પ્રાપ્ત</p></div>`;
                cont.appendChild(div);
            });
        }

        function showStats() {
            openOverlay("યુદ્ધ આંકડા (Level Wise)");
            const cont = document.getElementById('overlay-content');
            cont.innerHTML = '';
            
            for(let l=1; l < state.maxLvl; l++) {
                const res = state.history[l] || [];
                const correct = res.filter(r => r.status.includes('✅')).length;
                
                const div = document.createElement('div');
                div.className = "bg-black/40 p-5 rounded-2xl mb-3 border border-amber-900/30 cursor-pointer hover:border-amber-500 transition";
                div.innerHTML = `
                    <div class="flex justify-between items-center" onclick="toggleLevelDetail(${l})">
                        <div>
                            <span class="font-bold text-lg">લેવલ ${l}</span>
                            <p class="text-[10px] opacity-50 uppercase">${correct}/10 સાચા જવાબ</p>
                        </div>
                        <div class="text-amber-500">વિગત ➔</div>
                    </div>
                    <div id="lvl-detail-${l}" class="hidden mt-4 pt-4 border-t border-amber-900/20 text-[11px] space-y-2">
                        ${res.map((r, i) => `<div class="flex gap-2"><span class="${r.status.includes('✅')?'text-green-500':'text-red-500'}">${r.status.split(' ')[0]}</span> <span class="opacity-70">${i+1}. ${r.q.substring(0, 50)}...</span></div>`).join('')}
                    </div>
                `;
                cont.appendChild(div);
            }
        }

        function toggleLevelDetail(id) {
            const el = document.getElementById(`lvl-detail-${id}`);
            el.classList.toggle('hidden');
        }

        function openOverlay(title) {
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('overlay-ui').classList.remove('hidden');
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('summary-ui').classList.add('hidden');
        }

        function closeOverlay() { renderQuiz(); }

        function speakQAndA(q) {
            if(state.isMuted) return;
            window.speechSynthesis.cancel();
            const lang = state.lang === 'gu' ? 'gu-IN' : 'en-US';
            
            const utterQ = new SpeechSynthesisUtterance(q.q);
            utterQ.lang = lang;
            utterQ.onend = () => {
                if(state.busy) return;
                q.options.forEach((opt, i) => {
                    setTimeout(() => {
                        if(state.busy || state.isMuted) return;
                        const utterO = new SpeechSynthesisUtterance(`ઓપ્શન ${i+1}: ${opt}`);
                        utterO.lang = lang;
                        window.speechSynthesis.speak(utterO);
                    }, i * 1600);
                });
            };
            window.speechSynthesis.speak(utterQ);
        }

        function toggleAudio() {
            state.isMuted = !state.isMuted;
            document.getElementById('audio-btn').innerText = state.isMuted ? '🔇' : '🔊';
            if(state.isMuted) window.speechSynthesis.cancel();
        }

        function toggleLang() {
            state.lang = state.lang === 'gu' ? 'en' : 'gu';
            localStorage.setItem('mb_lang', state.lang);
            loadQuestions().then(renderQuiz);
        }

        function updateNavButtons() {
            const btn = document.getElementById('next-lock-btn');
            if(state.lvl < state.maxLvl) {
                btn.classList.remove('opacity-30', 'cursor-not-allowed');
                btn.classList.add('hover:text-white');
            } else {
                btn.classList.add('opacity-30', 'cursor-not-allowed');
            }
        }

        function saveProgress() {
            localStorage.setItem('mb_lvl', state.lvl);
            localStorage.setItem('mb_max_lvl', state.maxLvl);
            localStorage.setItem('mb_score', state.score);
            localStorage.setItem('mb_history', JSON.stringify(state.history));
            localStorage.setItem('mb_rewards', JSON.stringify(state.rewards));
        }

        window.onload = init;



document.addEventListener("DOMContentLoaded", async () => {
  const TRACKER_BASE = "https://hardipsinh.pythonanywhere.com";
  const TRACK_URL = `${TRACKER_BASE}/track`;
  const websiteName = "dharmgyan";

  // Build a minimal payload with just a few useful fields
  const payload = {
    website: websiteName,
    page_url: window.location.href,     // full current URL
    referrer: document.referrer || "",  // where the user came from
    user_agent: navigator.userAgent || "" // optional: browser UA
    // If you want one more: pathname
    // pathname: window.location.pathname
  };

  // Timeout controller (optional)
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 5000);

  try {
    const res = await fetch(TRACK_URL, {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json",
        "Accept-Language": navigator.language || "en",
        // "X-Tracker-Secret": "your-shared-secret", // if you enforce a server-side secret
      },
      body: JSON.stringify(payload),
      signal: controller.signal,
      cache: "no-store"
    });
    clearTimeout(timeout);

    if (!res.ok) {
      console.error("Track failed:", res.status, res.statusText);
      return;
    }

    const data = await res.json();
    console.log("Tracked:", data.website, "count:", data.count);

    const hitCountEl = document.getElementById("hitCount");
    if (hitCountEl) hitCountEl.textContent = `${data.count}`;
  } catch (err) {
    clearTimeout(timeout);
    console.error("Error calling tracker:", err);
  }
});
