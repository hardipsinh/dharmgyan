<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahabharat War 1000 Quests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;700&family=Metamorphous&display=swap');
        
        body {
            font-family: 'Hind Vadodara', sans-serif;
            background: radial-gradient(circle, #2a0505, #000);
            color: #fef3c7;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            user-select: none;
        }

        .war-asset {
            position: fixed;
            font-size: 3.5rem;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            transition: transform 2s ease-in-out, opacity 1s;
        }

        .glass-panel {
            background: rgba(30, 5, 5, 0.95);
            backdrop-filter: blur(15px);
            border: 2px solid #b45309;
            box-shadow: 0 0 40px rgba(180, 83, 9, 0.5);
            border-radius: 40px;
        }

        .bow-container {
            position: relative;
            height: 60px;
            background: rgba(0,0,0,0.4);
            border: 2px solid #b45309;
            border-radius: 30px;
            overflow: hidden;
        }

        #bow-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
            font-size: 32px;
            transition: left 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .option-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #78350f;
            transition: 0.3s;
            cursor: pointer;
        }

        .option-box:hover {
            background: rgba(180, 83, 9, 0.2);
            border-color: #f59e0b;
            transform: scale(1.03);
        }

        .correct { background: #064e3b !important; border-color: #10b981 !important; box-shadow: 0 0 15px #10b981; }
        .wrong { background: #7f1d1d !important; border-color: #ef4444 !important; box-shadow: 0 0 15px #ef4444; }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <!-- War Elements -->
    <div id="war-field"></div>

    <header class="w-full max-w-4xl flex justify-between items-center mb-8 z-10 p-2">
        <div>
            <h1 class="text-3xl font-black text-amber-500 italic uppercase leading-none">Mahabharat</h1>
            <p class="text-[9px] tracking-[0.4em] text-amber-200/40 font-bold uppercase">Hardipsinh Jadeja Present</p>
        </div>
        <div class="flex gap-3">
            <button onclick="changeLang()" class="border border-amber-600 px-4 py-2 rounded-xl text-xs font-black bg-amber-900/50">GU / EN</button>
            <button onclick="toggleAudio()" id="audio-btn" class="border border-amber-600 px-4 py-2 rounded-xl text-xs bg-amber-900/50">🔊</button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="w-full max-w-2xl mb-12 z-10">
        <div class="bow-container shadow-2xl">
            <div id="bow-arrow" style="left: 0%">🏹</div>
            <div class="absolute inset-0 flex justify-between items-center px-8 opacity-20 text-[10px] font-black uppercase tracking-widest pointer-events-none">
                <span>કૌરવ સેના</span>
                <span>પાંડવ વિજય</span>
            </div>
        </div>
    </div>

    <main class="w-full max-w-2xl z-10">
        <div class="glass-panel p-8 md:p-14 relative">
            <div id="game-ui">
                <div class="flex justify-between items-center mb-8">
                    <span id="counter" class="text-xs font-black bg-amber-600/10 border border-amber-600/30 px-3 py-1 rounded-full text-amber-500 uppercase">Quest: 1/1000</span>
                    <span id="score" class="text-2xl font-black text-amber-500">0</span>
                </div>

                <h2 id="question" class="text-2xl md:text-3xl font-bold mb-10 leading-snug">લોડ થઈ રહ્યું છે...</h2>

                <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10"></div>

                <div id="next-panel" class="hidden">
                    <div class="p-6 rounded-3xl bg-black/40 border-l-8 border-amber-600 mb-8">
                        <p id="explanation" class="text-sm italic text-amber-100/90"></p>
                    </div>
                    <button onclick="nextQuest()" class="w-full py-6 bg-gradient-to-r from-amber-700 to-amber-900 rounded-3xl font-black text-2xl border-2 border-amber-500 shadow-2xl">
                        આગળ વધો ➔
                    </button>
                </div>
            </div>

            <div id="victory-ui" class="hidden text-center py-10">
                <div class="text-9xl mb-8">🚩</div>
                <h2 class="text-4xl font-black text-amber-500 mb-4 uppercase">વિજયી ભવ!</h2>
                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="bg-black/30 p-6 rounded-3xl border border-amber-900">
                        <p id="v-score" class="text-3xl font-black">0</p>
                    </div>
                    <div class="bg-black/30 p-6 rounded-3xl border border-amber-900">
                        <p id="v-count" class="text-3xl font-black">0</p>
                    </div>
                </div>
                <button onclick="shareGame()" class="w-full py-6 bg-blue-700 rounded-3xl font-black text-xl mb-4">📲 રિઝલ્ટ શેર કરો</button>
                <button onclick="location.reload()" class="w-full py-6 bg-amber-700 rounded-3xl font-black text-xl">ફરીથી રમો</button>
            </div>
        </div>
    </main>

    <script>
        let state = {
            lang: 'gu',
            idx: parseInt(localStorage.getItem('mb_i')) || 0,
            score: parseInt(localStorage.getItem('mb_s')) || 0,
            answered: false,
            audioEnabled: true,
            db: []
        };

        const icons = ['🐘', '🐎', '🏹', '🔱', '🛡️', '⚔️', '🔥', '🏰', '🚩', '🛕'];

        async function init() {
            setupBG();
            await loadDB();
            render();
        }

        function setupBG() {
            const field = document.getElementById('war-field');
            for(let i=0; i<15; i++) {
                const icon = document.createElement('div');
                icon.className = 'war-asset';
                icon.innerText = icons[Math.floor(Math.random() * icons.length)];
                icon.style.left = Math.random() * 90 + 'vw';
                icon.style.top = Math.random() * 90 + 'vh';
                field.appendChild(icon);
            }
        }

        async function loadDB() {
            try {
                const res = await fetch(`que_${state.lang}.json`);
                let data = await res.json();
                
                // CRITICAL: Ensure exactly 1000 questions
                // If the JSON is smaller, we repeat the set but adjust IDs to reach 1000
                if(data.length < 1000) {
                    let fullDB = [];
                    while(fullDB.length < 1000) {
                        data.forEach(q => {
                            if(fullDB.length < 1000) {
                                fullDB.push({...q, id: fullDB.length + 1});
                            }
                        });
                    }
                    state.db = fullDB;
                } else {
                    state.db = data.slice(0, 1000);
                }
            } catch (err) {
                console.error("Files not found. Check que_gu.json and que_en.json");
            }
        }

        function changeLang() {
            state.lang = state.lang === 'gu' ? 'en' : 'gu';
            loadDB().then(render);
        }

        function toggleAudio() {
            state.audioEnabled = !state.audioEnabled;
            document.getElementById('audio-btn').innerText = state.audioEnabled ? '🔊' : '🔇';
            if(!state.audioEnabled) window.speechSynthesis.cancel();
        }

        function render() {
            if(!state.db.length) return;
            state.answered = false;
            const q = state.db[state.idx];

            document.querySelectorAll('.war-asset').forEach(el => {
                el.innerText = icons[Math.floor(Math.random() * icons.length)];
                el.style.left = Math.random() * 90 + 'vw';
                el.style.top = Math.random() * 90 + 'vh';
                el.style.opacity = '0.15';
            });

            document.getElementById('counter').innerText = `Quest: ${state.idx + 1}/1000`;
            document.getElementById('score').innerText = state.score;
            document.getElementById('question').innerText = q.q;

            const optGrid = document.getElementById('options');
            optGrid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-box p-6 rounded-3xl text-lg font-bold flex items-center gap-5';
                btn.innerHTML = `<span class="bg-amber-600/20 w-8 h-8 flex items-center justify-center rounded-full text-amber-500">${i+1}</span> ${opt}`;
                btn.onclick = () => handleSelect(i, btn);
                optGrid.appendChild(btn);
            });

            document.getElementById('next-panel').classList.add('hidden');
            optGrid.classList.remove('pointer-events-none');
            
            updateProgress();
            if(state.audioEnabled) speak(q.q);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = state.lang === 'gu' ? 'gu-IN' : 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function handleSelect(i, el) {
            if(state.answered) return;
            state.answered = true;
            const q = state.db[state.idx];
            const isCorrect = i === q.correct;
            
            document.getElementById('options').classList.add('pointer-events-none');
            if(isCorrect) { el.classList.add('correct'); state.score += 100; }
            else { el.classList.add('wrong'); document.getElementById('options').children[q.correct].classList.add('correct'); }

            document.getElementById('explanation').innerText = q.exp;
            document.getElementById('next-panel').classList.remove('hidden');
            save();
        }

        function nextQuest() {
            state.idx++;
            if(state.idx >= 1000) showVictory();
            else render();
        }

        function updateProgress() {
            const perc = (state.idx / 1000) * 100;
            document.getElementById('bow-arrow').style.left = `calc(${perc}% - 20px)`;
        }

        function showVictory() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('victory-ui').classList.remove('hidden');
            document.getElementById('v-score').innerText = `Score: ${state.score}`;
            document.getElementById('v-count').innerText = `Total: 1000`;
        }

        function save() {
            localStorage.setItem('mb_i', state.idx);
            localStorage.setItem('mb_s', state.score);
        }

        async function shareGame() {
            const text = `🚩 મેં મહાભારત રણસંગ્રામમાં ${state.score} સ્કોર કર્યો છે! ૧૦૦૦ પ્રશ્નોનું જ્ઞાન મેળવ્યું. રમો: ${window.location.href}`;
            if(navigator.share) await navigator.share({ text: text });
            else prompt("Copy this:", text);
        }

        window.onload = init;
    </script>
</body>
</html>
