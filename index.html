<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>મહાભારત રણસંગ્રામ - લેવલ વાઇઝ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;700&display=swap');
        body { font-family: 'Hind Vadodara', sans-serif; background: #1a0a0a; color: #fce7bc; overflow-x: hidden; }
        .glass { background: rgba(45, 10, 10, 0.95); border: 2px solid #b45309; box-shadow: 0 0 30px rgba(180, 83, 9, 0.5); }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; border: 1px solid #444; background: #fff; margin: 0 4px; }
        .dot-correct { background: #10b981 !important; }
        .dot-wrong { background: #ef4444 !important; }
        .dot-skip { background: #fff !important; }
        .option-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid #78350f; transition: 0.3s; cursor: pointer; }
        .option-btn:hover { background: #451a03; border-color: #f59e0b; }
        .war-asset { position: fixed; font-size: 3rem; pointer-events: none; z-index: 0; opacity: 0.1; transition: 2s; }
        #popup { z-index: 100; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Start Popup -->
    <div id="popup" class="fixed inset-0 flex items-center justify-center p-6 hidden">
        <div class="glass p-8 rounded-3xl max-w-md w-full text-center">
            <h2 class="text-3xl font-black mb-6 text-amber-500 uppercase">નમસ્તે યોદ્ધા!</h2>
            <p class="mb-6 opacity-70">રણભૂમિમાં ઉતરતા પહેલા તમારું નામ જણાવો:</p>
            <input type="text" id="username-input" class="w-full p-4 bg-black border border-amber-600 rounded-xl mb-6 text-center text-xl text-white outline-none">
            <button onclick="startGame()" class="w-full py-4 bg-amber-600 rounded-xl font-bold text-black text-xl hover:bg-amber-500">પ્રારંભ કરો</button>
        </div>
    </div>

    <!-- Background Elements -->
    <div id="war-field"></div>

    <header class="w-full max-w-4xl flex justify-between items-center mb-8 z-10 py-4 border-b border-amber-900">
        <div>
            <h1 class="text-2xl font-black text-amber-500 uppercase leading-none">MAHABHARAT</h1>
            <p id="player-display" class="text-[10px] text-amber-200 mt-1 uppercase font-bold"></p>
        </div>
        <div class="flex gap-2">
            <button onclick="prevLevel()" class="bg-amber-900/50 p-2 rounded text-xs">⏮️ Level</button>
            <button onclick="nextLevel()" id="skip-btn" class="bg-amber-900/50 p-2 rounded text-xs hidden">Next Level ⏭️</button>
            <button onclick="toggleLang()" class="bg-amber-700 px-3 py-1 rounded text-xs font-bold">GU/EN</button>
        </div>
    </header>

    <main class="w-full max-w-2xl z-10">
        <!-- Status Bar -->
        <div class="mb-6 flex flex-col items-center">
            <div class="text-xs font-bold text-amber-600 mb-2 uppercase tracking-widest">
                Level <span id="level-num">1</span> Progress
            </div>
            <div id="status-dots" class="flex justify-center mb-2">
                <!-- Dots generated here -->
            </div>
        </div>

        <div id="game-card" class="glass p-8 md:p-12 rounded-[2.5rem]">
            
            <div id="quiz-ui">
                <div class="flex justify-between items-center mb-8 text-xs font-bold text-amber-500/50 uppercase">
                    <span id="q-counter">Quest: 1/10</span>
                    <span id="score-display">Score: 0</span>
                </div>

                <h2 id="q-text" class="text-2xl md:text-3xl font-bold mb-10 leading-relaxed">લોડ થઈ રહ્યું છે...</h2>

                <div id="options-grid" class="grid grid-cols-1 gap-4 mb-8"></div>

                <div class="flex gap-2">
                    <button onclick="skipQuestion()" class="flex-1 py-4 border border-amber-900 rounded-xl text-xs font-bold opacity-50 hover:opacity-100 transition">Skip Question</button>
                </div>

                <div id="feedback" class="hidden mt-8">
                    <div class="p-6 bg-black/40 border-l-4 border-amber-600 rounded-2xl mb-6 text-sm italic" id="exp-text"></div>
                    <button onclick="handleNext()" class="w-full py-5 bg-amber-600 rounded-2xl font-black text-xl text-black">આગળ વધો</button>
                </div>
            </div>

            <!-- Level Result UI -->
            <div id="result-ui" class="hidden text-center py-6">
                <div id="gift-icon" class="text-7xl mb-6 animate-bounce">🎁</div>
                <h2 class="text-3xl font-black text-amber-500 mb-4">લેવલ પૂર્ણ!</h2>
                <p id="gift-text" class="text-amber-200 mb-8 italic"></p>
                
                <div class="grid grid-cols-3 gap-3 mb-10">
                    <div class="bg-black/40 p-4 rounded-xl border border-green-900">
                        <p class="text-[10px] text-green-500 uppercase">Sacha</p>
                        <p id="sacha-count" class="text-xl font-bold">0</p>
                    </div>
                    <div class="bg-black/40 p-4 rounded-xl border border-red-900">
                        <p class="text-[10px] text-red-500 uppercase">Khota</p>
                        <p id="khota-count" class="text-xl font-bold">0</p>
                    </div>
                    <div class="bg-black/40 p-4 rounded-xl border border-white/20">
                        <p class="text-[10px] text-gray-400 uppercase">Skip</p>
                        <p id="skip-count" class="text-xl font-bold">0</p>
                    </div>
                </div>

                <button onclick="showSummary()" class="w-full py-4 border border-amber-600 rounded-xl mb-4 text-xs font-bold">Score Details Summary</button>
                <button onclick="nextLevel()" class="w-full py-5 bg-amber-600 rounded-2xl font-black text-xl text-black mb-4">Next Level</button>
                <button onclick="retryLevel()" class="text-amber-500 underline text-sm">Retry Level</button>
            </div>
        </div>
    </main>

    <script>
        let state = {
            user: localStorage.getItem('mb_user') || '',
            lang: 'gu',
            level: parseInt(localStorage.getItem('mb_lvl')) || 1,
            qIndex: 0, // index within the level (0-9)
            score: 0,
            db: [],
            results: [], // array of {q, s, status: 'correct'|'wrong'|'skip'}
            answered: false,
            passedLevels: JSON.parse(localStorage.getItem('mb_passed')) || []
        };

        const weapons = ["ગાંડીવ ધનુષ", "સુદર્શન ચક્ર", "કૌમોદકી ગદા", "વિજય ધનુષ", "પશુપતાસ્ત્ર", "બ્રહ્માસ્ત્ર", "નંદક ખડગ", "પાંચજન્ય શંખ"];
        const warIcons = ['🐘', '🐎', '🏹', '🔱', '🛡️', '⚔️', '🚩'];

        async function init() {
            setupBG();
            if(!state.user) {
                document.getElementById('popup').classList.remove('hidden');
            } else {
                document.getElementById('player-display').innerText = `Warrior: ${state.user}`;
                await loadDB();
                render();
            }
        }

        function setupBG() {
            const field = document.getElementById('war-field');
            for(let i=0; i<12; i++) {
                const el = document.createElement('div');
                el.className = 'war-asset';
                el.innerText = warIcons[Math.floor(Math.random()*warIcons.length)];
                el.style.left = Math.random()*90 + 'vw';
                el.style.top = Math.random()*90 + 'vh';
                field.appendChild(el);
            }
        }

        function startGame() {
            const name = document.getElementById('username-input').value.trim();
            if(!name) return;
            state.user = name;
            localStorage.setItem('mb_user', name);
            document.getElementById('popup').classList.add('hidden');
            document.getElementById('player-display').innerText = `Warrior: ${name}`;
            loadDB().then(render);
        }

        async function loadDB() {
            const res = await fetch(`que_${state.lang}.json`);
            let data = await res.json();
            // Ensure 1000 items (mock loop for safety)
            while(data.length < 1000) data = data.concat(data);
            state.db = data.slice(0, 1000);
        }

        function render() {
            state.answered = false;
            const absoluteIdx = ((state.level - 1) * 10) + state.qIndex;
            const q = state.db[absoluteIdx];
            
            document.getElementById('level-num').innerText = state.level;
            document.getElementById('q-counter').innerText = `Quest: ${state.qIndex + 1}/10; Total: ${absoluteIdx + 1}/1000`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('score-display').innerText = `Score: ${state.score}`;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('div');
                btn.className = 'option-btn p-5 rounded-2xl font-bold flex items-center gap-4';
                btn.innerHTML = `<span class="opacity-30">${i+1}.</span> ${opt}`;
                btn.onclick = () => check(i, btn);
                grid.appendChild(btn);
            });

            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('result-ui').classList.add('hidden');
            grid.classList.remove('pointer-events-none');
            
            updateDots();
            checkSkipBtn();
        }

        function updateDots() {
            const container = document.getElementById('status-dots');
            container.innerHTML = '';
            for(let i=0; i<10; i++) {
                const dot = document.createElement('span');
                dot.className = 'dot';
                if(state.results[i]) {
                    if(state.results[i].status === 'correct') dot.classList.add('dot-correct');
                    else if(state.results[i].status === 'wrong') dot.classList.add('dot-wrong');
                    else dot.classList.add('dot-skip');
                }
                container.appendChild(dot);
            }
        }

        function check(idx, el) {
            if(state.answered) return;
            state.answered = true;
            const absoluteIdx = ((state.level - 1) * 10) + state.qIndex;
            const q = state.db[absoluteIdx];
            const correct = idx === q.correct;

            document.getElementById('options-grid').classList.add('pointer-events-none');
            if(correct) {
                el.classList.add('bg-green-900', 'border-green-500');
                state.score += 100;
                state.results[state.qIndex] = { q: q.q, status: 'correct' };
            } else {
                el.classList.add('bg-red-900', 'border-red-500');
                document.getElementById('options-grid').children[q.correct].classList.add('bg-green-900', 'border-green-500');
                state.results[state.qIndex] = { q: q.q, status: 'wrong' };
            }

            document.getElementById('exp-text').innerText = q.exp;
            document.getElementById('feedback').classList.remove('hidden');
            updateDots();
        }

        function skipQuestion() {
            if(state.answered) return;
            const absoluteIdx = ((state.level - 1) * 10) + state.qIndex;
            state.results[state.qIndex] = { q: state.db[absoluteIdx].q, status: 'skip' };
            handleNext();
        }

        function handleNext() {
            state.qIndex++;
            if(state.qIndex >= 10) {
                showLevelResult();
            } else {
                render();
            }
        }

        function showLevelResult() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            
            const sacha = state.results.filter(r => r.status === 'correct').length;
            const khota = state.results.filter(r => r.status === 'wrong').length;
            const skips = state.results.filter(r => r.status === 'skip').length;

            document.getElementById('sacha-count').innerText = sacha;
            document.getElementById('khota-count').innerText = khota;
            document.getElementById('skip-count').innerText = skips;

            const bhet = weapons[Math.floor(Math.random() * weapons.length)];
            document.getElementById('gift-text').innerText = `તમારા પરાક્રમ બદલ તમને ભેટમાં મળ્યું છે: ${bhet}!`;
            
            if(!state.passedLevels.includes(state.level)) {
                state.passedLevels.push(state.level);
                localStorage.setItem('mb_passed', JSON.stringify(state.passedLevels));
            }
            checkSkipBtn();
        }

        function nextLevel() {
            state.level++;
            state.qIndex = 0;
            state.results = [];
            localStorage.setItem('mb_lvl', state.level);
            render();
        }

        function prevLevel() {
            if(state.level <= 1) return;
            state.level--;
            state.qIndex = 0;
            state.results = [];
            localStorage.setItem('mb_lvl', state.level);
            render();
        }

        function retryLevel() {
            state.qIndex = 0;
            state.results = [];
            render();
        }

        function checkSkipBtn() {
            const btn = document.getElementById('skip-btn');
            if(state.passedLevels.includes(state.level)) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        }

        function showSummary() {
            let summaryText = `Warrior: ${state.user}\nLevel ${state.level} Summary:\n`;
            state.results.forEach((r, i) => {
                summaryText += `${i+1}. [${r.status.toUpperCase()}] ${r.q}\n`;
            });
            alert(summaryText); // In a real app, this would be a custom modal
        }

        function toggleLang() {
            state.lang = state.lang === 'gu' ? 'en' : 'gu';
            loadDB().then(render);
        }

        window.onload = init;
    </script>
</body>
</html>
